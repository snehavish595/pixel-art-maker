<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Interactive Pixel Art Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎨 Pixel Art Maker</h1>
        <p>Set your grid size, pick a color, and start drawing!</p>

        <div class="controls">
            <div class="control-group">
                <label for="colorPicker">Color:</label>
                <input type="color" id="colorPicker" value="#4A90E2">
            </div>
            
            <div class="control-group">
                <label for="gridSize">Grid Size: <span id="sizeValue">16 x 16</span></label>
                <input type="range" id="gridSize" min="8" max="32" value="16">
            </div>

            <button id="clearBtn">Clear Canvas</button>
        </div>

        <div id="canvas" class="grid-canvas"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
