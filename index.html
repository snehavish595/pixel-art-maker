<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Interactive Pixel Art Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎨 Pixel Art Maker</h1>
        <p>Set your grid size, pick a color, and start drawing!</p>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="colorPicker">Custom:</label>
                    <input type="color" id="colorPicker" value="#4A90E2">
                </div>
                
                <div class="control-group">
                    <label for="gridSize">Grid Size: <span id="sizeValue">16 x 16</span></label>
                    <input type="range" id="gridSize" min="8" max="32" value="16">
                </div>
            </div>

            <div class="palette-container">
                <label>Quick Palettes:</label>
                <div class="swatches">
                    <div class="swatch" style="background-color: #ef4444;" data-color="#ef4444"></div>
                    <div class="swatch" style="background-color: #f97316;" data-color="#f97316"></div>
                    <div class="swatch" style="background-color: #eab308;" data-color="#eab308"></div>
                    <div class="swatch" style="background-color: #22c55e;" data-color="#22c55e"></div>
                    <div class="swatch" style="background-color: #3b82f6;" data-color="#3b82f6"></div>
                    <div class="swatch" style="background-color: #a855f7;" data-color="#a855f7"></div>
                    <div class="swatch" style="background-color: #000000;" data-color="#000000"></div>
                    <div class="swatch" style="background-color: #94a3b8;" data-color="#94a3b8"></div>
                </div>
            </div>

            <div class="tool-group">
                <button id="drawModeBtn" class="tool-btn active">✏️ Draw</button>
                <button id="eraseModeBtn" class="tool-btn">🧽 Eraser</button>
            </div>

            <div class="button-group">
                <button id="clearBtn" class="danger-btn">Clear Canvas</button>
                <button id="downloadBtn" class="success-btn">💾 Download Art</button>
            </div>
        </div>

        <div class="stats-counter">
            📏 Pixels Colored: <span id="coloredCount">0</span> / <span id="totalCount">256</span>
        </div>

        <div id="canvas" class="grid-canvas"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
